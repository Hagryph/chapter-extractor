[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "chapter-extractor"
version = "0.1.0"
description = "Desktop app for extracting batch chapters into individual files."
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
gui = [
    "PySide6>=6.7",
    "pyqtdarktheme>=2.1",
]
dev = [
    "pytest>=8",
    "ruff>=0.6",
]

[project.scripts]
chapter-extractor = "chapter_extractor.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
addopts = ["--import-mode=importlib", "-q"]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "N", "SIM"]
ignore = ["E501"]
